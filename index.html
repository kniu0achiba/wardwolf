<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>生物ワードウルフ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0f3d2e;
  --panel:#124734;
  --accent:#36a56e;
  --text:#eafaf1;
  --outline:#7cd5a9;
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Noto Sans JP",system-ui,sans-serif;
}

.center-screen{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.card{
  width:100%;
  max-width:680px;
  background:var(--panel);
  border-radius:14px;
  padding:24px;
  text-align:center;
}

select,input,button{
  width:100%;
  max-width:280px;
  padding:14px;
  font-size:1rem;
  border-radius:999px;
  border:2px solid var(--outline);
}

button{
  margin-top:12px;
  background:var(--accent);
  color:#062116;
  font-weight:bold;
  cursor:pointer;
}

.word{
  display:inline-block;
  padding:12px 20px;
  background:#7cd5a9;
  color:#052017;
  border-radius:10px;
  font-weight:bold;
  font-size:1.4rem;   /* 答えを大きくして強調 */
}

/* タイマー表示用 */
.timer-box{
  display:inline-block;        /* 中身の大きさに合わせる */
  margin:16px auto;
  padding:16px 18px;           /* 1～2周り分だけ余白 */
  background:#155d45;          /* 背景より少しだけ明るい緑 */
  border:3px solid var(--outline);
  border-radius:18px;          /* 角丸の四角 */
  font-size:2.2rem;            /* タイマー文字を大きく */
  font-weight:bold;
  letter-spacing:0.05em;
  text-align:center;
}

/* タイマーと答えボタンを縦に並べる */
.timer-area{
  display:flex;
  flex-direction:column;   /* 上から下に並べる */
  align-items:center;      /* 横方向を中央揃え */
}
</style>
</head>

<body>
<div class="center-screen">
  <div class="card">
    <h1>生物ワードウルフ</h1>
    <div id="app"></div>
  </div>
</div>

<script>
const DATA = {
  "生物の進化":{
    "1":["DNA","RNA","RNAワールド","突然変異","置換","挿入","欠失"],
    "2":["シアノバクテリア","ストロマトライト","細胞内共生"],
    "3":["古生代","中生代","新生代"],
    "4":["減数分裂","受精","遺伝子型","対立遺伝子"],
    "5":["自然選択","適応","共進化","性選択"],
    "6":["分類","ドメイン","学名"],
    "7":["細菌","真核生物","植物","動物"],
    "8":["霊長類","類人猿","ホモ・サピエンス"]
  },
  "細胞と分子":{
    "9":["タンパク質","脂質","核酸","炭水化物"],
    "10":["細胞小器官","細胞質","流動モザイクモデル"],
    "11":["ペプチド結合","αヘリックス","βシート"],
    "12":["原核細胞","真核細胞","多細胞生物"],
    "13":["ミトコンドリア","葉緑体","核膜"],
    "14":["微小管","アクチンフィラメント","中間径フィラメント"],
    "15":["酵素","基質","活性部位"],
    "16":["拡散","能動輸送","ナトリウムポンプ"]
  },
  "代謝":{
    "17":["呼吸","光合成","ATP","ADP"],
    "18":["クエン酸回路","電子伝達系","酸化的リン酸化"],
    "19":["クロロフィル","光化学系","カルビン回路"],
    "20":["C3植物","C4植物","CAM植物"]
  }
};

let state = {
  timer:null,
  timeLeft:0
};

const app = document.getElementById("app");

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* 単元選択 */
function showUnitSelect(){
  app.innerHTML=`
    <h2>単元を選択してください</h2>
    <select id="unit">
      <!-- 未選択時の表示（プレースホルダー的役割） -->
      <option value="" disabled selected>例：生物の進化</option>

      <!-- ランダム選択 -->
      <option value="random">ランダム</option>

      <!-- 通常の単元 -->
      ${Object.keys(DATA).map(u=>`<option value="${u}">${u}</option>`).join("")}
    </select>
    <button onclick="decideUnit()">決定</button>
  `;
}

function decideUnit(){
  const unit = document.getElementById("unit").value;

  // 何も選ばれていない場合のガード
  if(unit === ""){
    alert("単元を選択してください。");
    return;
  }

  // 🔴 ランダムモード
  if(unit === "random"){

    const allWords = [];

    // DATA内の全単語を1つの配列にまとめる
    Object.values(DATA).forEach(unitObj => {
      Object.values(unitObj).forEach(group => {
        allWords.push(...group);
      });
    });

    /*
      Setを使って重複を除去
      → 同一単語が複数あっても1回だけ残る
    */
    const uniqueWords = [...new Set(allWords)];

    // シャッフルして先頭2つを使用
    const w = shuffle([...uniqueWords]);
    state.wolfWord = w[0];
    state.villagerWord = w[1];
  }
  // 🟢 通常モード（従来どおり）
  else{
    const group = shuffle(Object.values(DATA[unit]))[0];
    const w = shuffle([...group]);
    state.wolfWord = w[0];
    state.villagerWord = w[1];
  }

  showNumberInput();
}

/* 人数入力 */
function showNumberInput(){
  app.innerHTML=`
    <h2>参加人数（3人以上）</h2>
    <input id="num" type="number" min="3">
    <button onclick="startGame()">決定</button>
  `;
}

function startGame(){
  const n=Number(document.getElementById("num").value);
  if(n<3){
    alert("3人以上で参加してください。");
    return;
  }
  state.total=n;
  state.wolfIndex=Math.floor(Math.random()*n);
  state.current=0;
  nextPlayer();
}

/* 各自確認 */
function nextPlayer(){
  if(state.current>=state.total){
    showTimerSetting();
    return;
  }
  app.innerHTML=`
    <h2>${state.current+1}人目の人ですか？</h2>
    <button onclick="showWord()">はい</button>
  `;
}

function showWord(){
  const word = state.current===state.wolfIndex ? state.wolfWord : state.villagerWord;
  app.innerHTML=`
    <h2>あなたのワードは<br>
    <span class="word">「${word}」</span></h2>
    <button onclick="confirm()">確認しました</button>
  `;
}

function confirm(){
  state.current++;
  nextPlayer();
}

/* タイマー設定 */
function showTimerSetting(){
  let options="";
  for(let i=30;i<=600;i+=30){
    options+=`<option value="${i}">${i/60>=1?`${i/60}分`:`${i}秒`}</option>`;
  }
  app.innerHTML=`
    <h2>話し合い時間を選択</h2>
    <select id="time">${options}</select>
    <button onclick="startTimer()">話し合いを始める</button>
  `;
}


/* タイマー表示用（mm:ss） */
function formatTime(sec){
  const m = String(Math.floor(sec / 60)).padStart(2,"0");
  const s = String(sec % 60).padStart(2,"0");
  return `${m}:${s}`;
}

/* タイマー開始 */
function startTimer(){
  state.timeLeft=Number(document.getElementById("time").value);
  showTimer();
  state.timer=setInterval(()=>{
    state.timeLeft--;
    showTimer();
    if(state.timeLeft<=0){
      clearInterval(state.timer);
      showEnd();
    }
  },1000);
}

function showTimer(){
  app.innerHTML=`
    <h2>残り時間</h2>
    <div class="timer-area">
      <div class="timer-box">
        ${formatTime(state.timeLeft)}
      </div>
      <button onclick="showAnswer()">答え</button>
    </div>
  `;
}

/* 終了 */
function showEnd(){
  app.innerHTML=`
    <h2>終了です。<br>
    人狼だと思う人とその単語を考えてください。</h2>
    <button onclick="showAnswer()">答え</button>
  `;
}

/* 答え表示 */
function showAnswer(){
  clearInterval(state.timer);
  app.innerHTML=`
    <h2>答え</h2>
    <p>🐺 人狼の単語：<span class="word">${state.wolfWord}</span></p>
    <p>👨‍🌾 村人の単語：<span class="word">${state.villagerWord}</span></p>
    <button onclick="showUnitSelect()">新しいゲームを始める</button>
  `;
}

showUnitSelect();
</script>
</body>
</html>
